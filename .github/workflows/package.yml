name: Package ZIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    env:
      BINARY_NAME: gunny-launcher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev
          # Install WebKitGTK (provides webkit2gtk-4.1.pc) — large package
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev || true
          CANDIDATES=("libsoup-3.0-dev" "libsoup3.0-dev" "libsoup2.4-dev" "gir1.2-soup-3.0")
          for pkg in "${CANDIDATES[@]}"; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              sudo apt-get install -y "$pkg"
              echo "Installed $pkg"
              break
            fi
          done
          # Try installing JavaScriptCoreGTK / WebKitGTK dev package for javascriptcoregtk-4.1
          JSC_CAND=("libjavascriptcoregtk-4.1-dev" "libwebkit2gtk-4.1-dev" "libjavascriptcoregtk-4.1-0")
          for pkg in "${JSC_CAND[@]}"; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              sudo apt-get install -y "$pkg"
              echo "Installed $pkg"
              break
            fi
          done

      - name: Install system dependencies (Windows via MSYS2)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-glib2 mingw-w64-x86_64-pkg-config mingw-w64-x86_64-gtk3

      - name: Install libsoup on MSYS2
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          CANDIDATES=("mingw-w64-x86_64-libsoup" "mingw-w64-x86_64-libsoup3" "mingw-w64-x86_64-libsoup2.4")
          for pkg in "${CANDIDATES[@]}"; do
            if pacman -Ss "$pkg" >/dev/null 2>&1; then
              pacman -S --noconfirm --needed "$pkg" || true
              echo "Installed $pkg"
              break
            fi
          done

      - name: Install JavaScriptCore/WebKit on MSYS2
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          JSC_CAND=("mingw-w64-x86_64-javascriptcoregtk4.1" "mingw-w64-x86_64-webkit2gtk" "mingw-w64-x86_64-webkit2gtk4.1")
          for pkg in "${JSC_CAND[@]}"; do
            if pacman -Ss "$pkg" >/dev/null 2>&1; then
              pacman -S --noconfirm --needed "$pkg" || true
              echo "Installed $pkg"
              break
            fi
          done

      - name: Build release
        run: cargo build --release

      - id: package_zip
        name: Create ZIP package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          TARGET_DIR=target/release
          TAG_OR_SHA=${{ github.ref_name || github.sha }}
          FOLDER_NAME="${BINARY_NAME}-${TAG_OR_SHA}-${{ matrix.os }}"
          ZIP_NAME="${FOLDER_NAME}.zip"
          mkdir -p "$FOLDER_NAME"
          cp "$TARGET_DIR/$BINARY_NAME" "$FOLDER_NAME/"
          cp README.md "$FOLDER_NAME/README.md"
          chmod +x "$FOLDER_NAME/$BINARY_NAME" || true
          zip -r "$ZIP_NAME" "$FOLDER_NAME"
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - id: package_zip_windows
        name: Create ZIP package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $binaryName = '${{ env.BINARY_NAME }}'
          $targetDir = 'target\release'
          $tagOrSha = '${{ github.ref_name || github.sha }}'
          $folderName = "$($binaryName)-$tagOrSha-windows"
          $zipName = "$folderName.zip"
          New-Item -ItemType Directory -Path $folderName -Force | Out-Null
          Copy-Item -Path "$targetDir\$binaryName.exe" -Destination $folderName -Force
          Copy-Item -Path "README.md" -Destination $folderName -Force
          Compress-Archive -Path $folderName -DestinationPath $zipName -Force
          Write-Output "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Show created ZIP (debug - Linux)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "Package step outputs (linux): '${{ steps.package_zip.outputs.zip_name }}'"
          echo "Package step outputs (windows): '${{ steps.package_zip_windows.outputs.zip_name }}'"
          echo "Listing repository root:"
          ls -la || true

      - name: Show created ZIP (debug - Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Output "OS: $($env:RUNNER_OS)"
          Write-Output "Package step outputs (linux): '${{ steps.package_zip.outputs.zip_name }}'"
          Write-Output "Package step outputs (windows): '${{ steps.package_zip_windows.outputs.zip_name }}'"
          Write-Output "Listing repository root:"
          Get-ChildItem -Force

      - name: Upload ZIP artifact (Linux)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: gunny-launcher-zip-ubuntu-latest
          path: ${{ steps.package_zip.outputs.zip_name }}

      - name: Upload ZIP artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: gunny-launcher-zip-windows-latest
          path: ${{ steps.package_zip_windows.outputs.zip_name }}

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release and attach ZIPs
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
